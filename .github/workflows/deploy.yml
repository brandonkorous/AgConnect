name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
        type: choice
        options: [prod]

concurrency:
  group: deploy-${{ inputs.environment || 'prod' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: us-west1-docker.pkg.dev
  AR_PATH: ${{ secrets.GCP_PROJECT_ID }}/containers
  TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: web,             dockerfile: apps/web/Dockerfile,                 image: web }
          - { name: api,             dockerfile: services/api/Dockerfile,             image: api }
          - { name: email-worker,    dockerfile: services/email-worker/Dockerfile,    image: email-worker }
          - { name: sms-worker,      dockerfile: services/sms-worker/Dockerfile,      image: sms-worker }
          - { name: flc-verifier,    dockerfile: services/flc-verifier/Dockerfile,    image: flc-verifier }
          - { name: audit-retention, dockerfile: services/audit-retention/Dockerfile, image: audit-retention }
          - { name: audit-verifier,  dockerfile: services/audit-verifier/Dockerfile,  image: audit-verifier }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.AR_PATH }}/${{ matrix.target.image }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.AR_PATH }}/${{ matrix.target.image }}:latest
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,scope=${{ matrix.target.name }},mode=max
          # NEXT_PUBLIC_* are inlined into the client bundle by Next.js at build
          # time, so they have to live here rather than in the runtime K8s
          # secret. Non-web Dockerfiles ignore unrecognized ARGs (warn-only).
          build-args: |
            NODE_VERSION=22.12.0
            PNPM_VERSION=10.9.0
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          secrets: |
            fontawesome_token=${{ secrets.FONTAWESOME_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      # Federated identity to GCP. The provider + service account are
      # created by Terraform (infra/terraform). Repo binding is enforced via
      # the WIF provider's attribute_condition.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - id: gke
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: agconn-prod
          location: us-west1-a

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Ensure namespace, ServiceAccount, and ConfigMap exist
        run: |
          # All three are bootstrap resources the migrate Job needs before
          # the full manifest apply later. Job spec references the agconn SA
          # AND envFrom configMapRef: agconn-config — both must exist before
          # K8s will start the pod (FailedCreate / CreateContainerConfigError).
          kubectl apply -f deploy/k8s/base/namespace.yaml
          kubectl apply -f deploy/k8s/base/service-account.yaml
          kubectl apply -f deploy/k8s/base/configmap.yaml

      - name: Apply runtime Secret (agconn-env) from GHA secrets
        env:
          DATABASE_URL:                          ${{ secrets.DATABASE_URL }}
          DIRECT_URL:                            ${{ secrets.DIRECT_URL }}
          AUDIT_HMAC_KEY:                        ${{ secrets.AUDIT_HMAC_KEY }}
          AUDIT_HMAC_KEY_VERSION:                ${{ secrets.AUDIT_HMAC_KEY_VERSION }}
          ADMIN_BEARER_TOKEN:                    ${{ secrets.ADMIN_BEARER_TOKEN }}
          PARTICIPANT_PEPPER:                    ${{ secrets.PARTICIPANT_PEPPER }}
          CLERK_SECRET_KEY:                      ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:     ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_WEBHOOK_SECRET:                  ${{ secrets.CLERK_WEBHOOK_SECRET }}
          RESEND_API_KEY:                        ${{ secrets.RESEND_API_KEY }}
          RESEND_WEBHOOK_SECRET:                 ${{ secrets.RESEND_WEBHOOK_SECRET }}
          WAITLIST_TOKEN_SECRET:                 ${{ secrets.WAITLIST_TOKEN_SECRET }}
          SENTRY_DSN:                            ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_DSN:                ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN:                     ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:                            ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:                        ${{ secrets.SENTRY_PROJECT }}
          NEXT_PUBLIC_POSTHOG_KEY:               ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          POSTHOG_API_KEY:                       ${{ secrets.POSTHOG_API_KEY }}
          STRIPE_SECRET_KEY:                     ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET:                 ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO_MONTHLY:              ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_YEARLY:               ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
          STRIPE_PRICE_ENT_MONTHLY:              ${{ secrets.STRIPE_PRICE_ENT_MONTHLY }}
          STRIPE_PRICE_ENT_YEARLY:               ${{ secrets.STRIPE_PRICE_ENT_YEARLY }}
          STRIPE_PRICE_PRO_FOUNDER_MONTHLY:      ${{ secrets.STRIPE_PRICE_PRO_FOUNDER_MONTHLY }}
          STRIPE_PRICE_PRO_FOUNDER_YEARLY:       ${{ secrets.STRIPE_PRICE_PRO_FOUNDER_YEARLY }}
          STRIPE_PRICE_ENT_FOUNDER_MONTHLY:      ${{ secrets.STRIPE_PRICE_ENT_FOUNDER_MONTHLY }}
          STRIPE_PRICE_ENT_FOUNDER_YEARLY:       ${{ secrets.STRIPE_PRICE_ENT_FOUNDER_YEARLY }}
          TWILIO_ACCOUNT_SID:                    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:                     ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_MESSAGING_SERVICE_SID:          ${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}
          TWILIO_INBOUND_PHONE:                  ${{ secrets.TWILIO_INBOUND_PHONE }}
          SUPABASE_URL:                          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:             ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN:              ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
        run: |
          set -euo pipefail
          kubectl -n agconn create secret generic agconn-env \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=DIRECT_URL="$DIRECT_URL" \
            --from-literal=AUDIT_HMAC_KEY="$AUDIT_HMAC_KEY" \
            --from-literal=AUDIT_HMAC_KEY_VERSION="$AUDIT_HMAC_KEY_VERSION" \
            --from-literal=ADMIN_BEARER_TOKEN="$ADMIN_BEARER_TOKEN" \
            --from-literal=PARTICIPANT_PEPPER="$PARTICIPANT_PEPPER" \
            --from-literal=CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
            --from-literal=NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" \
            --from-literal=CLERK_WEBHOOK_SECRET="$CLERK_WEBHOOK_SECRET" \
            --from-literal=RESEND_API_KEY="$RESEND_API_KEY" \
            --from-literal=RESEND_WEBHOOK_SECRET="$RESEND_WEBHOOK_SECRET" \
            --from-literal=WAITLIST_TOKEN_SECRET="$WAITLIST_TOKEN_SECRET" \
            --from-literal=SENTRY_DSN="$SENTRY_DSN" \
            --from-literal=NEXT_PUBLIC_SENTRY_DSN="$NEXT_PUBLIC_SENTRY_DSN" \
            --from-literal=SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN" \
            --from-literal=SENTRY_ORG="$SENTRY_ORG" \
            --from-literal=SENTRY_PROJECT="$SENTRY_PROJECT" \
            --from-literal=NEXT_PUBLIC_POSTHOG_KEY="$NEXT_PUBLIC_POSTHOG_KEY" \
            --from-literal=POSTHOG_API_KEY="$POSTHOG_API_KEY" \
            --from-literal=STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
            --from-literal=STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
            --from-literal=STRIPE_PRICE_PRO_MONTHLY="$STRIPE_PRICE_PRO_MONTHLY" \
            --from-literal=STRIPE_PRICE_PRO_YEARLY="$STRIPE_PRICE_PRO_YEARLY" \
            --from-literal=STRIPE_PRICE_ENT_MONTHLY="$STRIPE_PRICE_ENT_MONTHLY" \
            --from-literal=STRIPE_PRICE_ENT_YEARLY="$STRIPE_PRICE_ENT_YEARLY" \
            --from-literal=STRIPE_PRICE_PRO_FOUNDER_MONTHLY="$STRIPE_PRICE_PRO_FOUNDER_MONTHLY" \
            --from-literal=STRIPE_PRICE_PRO_FOUNDER_YEARLY="$STRIPE_PRICE_PRO_FOUNDER_YEARLY" \
            --from-literal=STRIPE_PRICE_ENT_FOUNDER_MONTHLY="$STRIPE_PRICE_ENT_FOUNDER_MONTHLY" \
            --from-literal=STRIPE_PRICE_ENT_FOUNDER_YEARLY="$STRIPE_PRICE_ENT_FOUNDER_YEARLY" \
            --from-literal=TWILIO_ACCOUNT_SID="$TWILIO_ACCOUNT_SID" \
            --from-literal=TWILIO_AUTH_TOKEN="$TWILIO_AUTH_TOKEN" \
            --from-literal=TWILIO_MESSAGING_SERVICE_SID="$TWILIO_MESSAGING_SERVICE_SID" \
            --from-literal=TWILIO_INBOUND_PHONE="$TWILIO_INBOUND_PHONE" \
            --from-literal=SUPABASE_URL="$SUPABASE_URL" \
            --from-literal=SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --from-literal=NEXT_PUBLIC_MAPBOX_TOKEN="$NEXT_PUBLIC_MAPBOX_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Pin image tags via kustomize
        working-directory: deploy/k8s/overlays/prod
        run: |
          set -euo pipefail
          AR_BASE="${{ env.REGISTRY }}/${{ env.AR_PATH }}"
          TAG=${{ env.TAG }}
          for img in web api email-worker sms-worker flc-verifier audit-retention audit-verifier; do
            kustomize edit set image ${AR_BASE}/${img}=${AR_BASE}/${img}:${TAG}
          done

      - name: Run DB migrate Job (waits for completion)
        run: |
          set -euo pipefail
          AR_BASE="${{ env.REGISTRY }}/${{ env.AR_PATH }}"
          TAG=${{ env.TAG }}
          sed -e "s|REPLACE_AR_BASE|${AR_BASE}|g" -e "s|REPLACE_TAG|${TAG}|g" \
            deploy/k8s/base/db-migrate-job.yaml | kubectl apply -f -
          kubectl -n agconn wait --for=condition=complete --timeout=10m \
            job/db-migrate-${TAG} || {
              kubectl -n agconn logs job/db-migrate-${TAG} || true
              exit 1
            }

      - name: Apply manifests
        run: |
          kubectl apply -k deploy/k8s/overlays/prod
          kubectl -n agconn rollout status deployment/web --timeout=10m
          kubectl -n agconn rollout status deployment/api --timeout=10m
          kubectl -n agconn rollout status deployment/email-worker --timeout=5m
          kubectl -n agconn rollout status deployment/sms-worker --timeout=5m
          kubectl -n agconn rollout status deployment/flc-verifier --timeout=5m
