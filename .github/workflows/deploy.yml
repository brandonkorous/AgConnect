name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
        type: choice
        options: [prod, preview]

concurrency:
  group: deploy-${{ inputs.environment || 'prod' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: web,             dockerfile: apps/web/Dockerfile,             image: agconn-web }
          - { name: api,             dockerfile: services/api/Dockerfile,         image: agconn-api }
          - { name: email-worker,    dockerfile: services/email-worker/Dockerfile, image: agconn-email-worker }
          - { name: sms-worker,      dockerfile: services/sms-worker/Dockerfile,   image: agconn-sms-worker }
          - { name: audit-retention, dockerfile: services/audit-retention/Dockerfile, image: agconn-audit-retention }
          - { name: audit-verifier,  dockerfile: services/audit-verifier/Dockerfile,  image: agconn-audit-verifier }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.target.image }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.target.image }}:latest
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,scope=${{ matrix.target.name }},mode=max
          build-args: |
            NODE_VERSION=22.12.0
            PNPM_VERSION=10.9.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      # Federated identity to Azure: configure once via
      # `az ad app federated-credential create` for the github-actions OIDC
      # subject `repo:OWNER/REPO:environment:prod`.
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Pin image tags via kustomize
        working-directory: deploy/k8s/overlays/prod
        run: |
          set -euo pipefail
          OWNER=${{ env.IMAGE_OWNER }}
          TAG=${{ env.TAG }}
          for img in agconn-web agconn-api agconn-email-worker agconn-sms-worker agconn-audit-retention agconn-audit-verifier; do
            kustomize edit set image ghcr.io/REPLACE_OWNER/${img}=ghcr.io/${OWNER}/${img}:${TAG}
          done

      - name: Run DB migrate Job (waits for completion)
        run: |
          set -euo pipefail
          OWNER=${{ env.IMAGE_OWNER }}
          TAG=${{ env.TAG }}
          # Substitute placeholders in the migrate Job template + apply.
          sed -e "s|REPLACE_OWNER|${OWNER}|g" -e "s|REPLACE_TAG|${TAG}|g" \
            deploy/k8s/base/db-migrate-job.yaml | kubectl apply -f -
          kubectl -n agconn wait --for=condition=complete --timeout=10m \
            job/db-migrate-${TAG} || {
              kubectl -n agconn logs job/db-migrate-${TAG} || true
              exit 1
            }

      - name: Apply manifests
        run: |
          kubectl apply -k deploy/k8s/overlays/prod
          kubectl -n agconn rollout status deployment/web --timeout=10m
          kubectl -n agconn rollout status deployment/api --timeout=10m
          kubectl -n agconn rollout status deployment/email-worker --timeout=5m
          kubectl -n agconn rollout status deployment/sms-worker --timeout=5m
