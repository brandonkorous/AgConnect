apiVersion: v1
kind: ConfigMap
metadata:
  name: agconn-config
  namespace: agconn
data:
  NODE_ENV: production
  APP_ENV: production
  NEXT_PUBLIC_APP_ENV: production
  NEXT_PUBLIC_SITE_URL: "https://agconn.com"
  NEXT_PUBLIC_API_BASE_URL: "https://api.agconn.com"
  PUBLIC_API_URL: "https://api.agconn.com"
  PUBLIC_WEB_URL: "https://agconn.com"
  NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
  POSTHOG_HOST: "https://us.i.posthog.com"
  RESEND_FROM_EMAIL: "AGCONN <hello@agconn.com>"
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/en/sign-in"
  NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/en/sign-up"
  NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: "/en"
  NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: "/en"
  # TEMPORARY pre-launch test switch — disables the 9PM-7AM PT SMS quiet-hours
  # window so the sole tester isn't blocked mid-flow. Read by both api
  # (enqueue-time defer) and sms-worker (pre-send check) via isQuietHours().
  # REMOVE before real workers are on the platform — quiet-hours compliance is
  # a TCPA/FCC legal requirement. Tracked: revert with launch.
  SMS_QUIET_HOURS_DISABLED: "1"
