# Default ServiceAccount for every Deployment in the agconn namespace.
# Pods don't need to call GCP APIs at runtime — secrets are projected from a
# K8s Secret (agconn-env) that the deploy workflow creates from GitHub Actions
# secrets. So no Workload Identity binding is needed here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agconn
  namespace: agconn
