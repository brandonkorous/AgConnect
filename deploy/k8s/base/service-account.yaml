# Workload-identity ServiceAccount used by every Deployment so they can pull
# secrets from Key Vault via the CSI driver without per-pod credentials.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agconn
  namespace: agconn
  annotations:
    azure.workload.identity/client-id: REPLACE_USER_ASSIGNED_IDENTITY_CLIENT_ID
  labels:
    azure.workload.identity/use: "true"
