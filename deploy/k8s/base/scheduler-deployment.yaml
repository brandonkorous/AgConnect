apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: agconn
  labels: { app.kubernetes.io/name: scheduler, app.kubernetes.io/part-of: agconn }
spec:
  # Singleton — scheduler enqueues time-based jobs (training reminders,
  # application nudges, weekly KPI rollups). Running multiple replicas would
  # double-enqueue. pg-boss schedule cron locks survive node preemption.
  replicas: 1
  strategy:
    type: Recreate
  selector: { matchLabels: { app.kubernetes.io/name: scheduler } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scheduler
    spec:
      serviceAccountName: agconn
      nodeSelector: { pool: worker }
      tolerations:
        - key: cloud.google.com/gke-spot
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: scheduler
          image: us-west1-docker.pkg.dev/agconn/containers/scheduler:latest
          envFrom:
            - configMapRef: { name: agconn-config }
            - secretRef: { name: agconn-env }
          resources:
            requests: { cpu: 25m, memory: 128Mi }
            limits: { cpu: 250m, memory: 384Mi }
