# Azure Key Vault → CSI driver mapping. Secrets in Key Vault are mounted as
# files at /mnt/secrets-store and synced to a K8s Secret named "agconn-env"
# which Deployments consume via envFrom.
#
# Prereqs in the AKS cluster:
#   az aks enable-addons --addons azure-keyvault-secrets-provider \
#     --resource-group <rg> --name <aks>
#   Create a UserAssignedIdentity, grant it Key Vault "secrets get" permission,
#   bind it to the agconn ServiceAccount via federated credential.
#
# Update KEY_VAULT_NAME, TENANT_ID, USER_ASSIGNED_IDENTITY_ID at deploy time
# (kustomize replacements / helm values, etc).

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agconn-env
  namespace: agconn
spec:
  provider: azure
  secretObjects:
    - secretName: agconn-env
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
        - objectName: audit-hmac-key
          key: AUDIT_HMAC_KEY
        - objectName: audit-hmac-key-version
          key: AUDIT_HMAC_KEY_VERSION
        - objectName: clerk-secret-key
          key: CLERK_SECRET_KEY
        - objectName: clerk-publishable-key
          key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        - objectName: clerk-webhook-secret
          key: CLERK_WEBHOOK_SECRET
        - objectName: resend-api-key
          key: RESEND_API_KEY
        - objectName: resend-webhook-secret
          key: RESEND_WEBHOOK_SECRET
        - objectName: waitlist-token-secret
          key: WAITLIST_TOKEN_SECRET
        - objectName: admin-bearer-token
          key: ADMIN_BEARER_TOKEN
        - objectName: sentry-dsn
          key: SENTRY_DSN
        - objectName: sentry-public-dsn
          key: NEXT_PUBLIC_SENTRY_DSN
        - objectName: sentry-auth-token
          key: SENTRY_AUTH_TOKEN
        - objectName: posthog-key
          key: NEXT_PUBLIC_POSTHOG_KEY
        - objectName: posthog-api-key
          key: POSTHOG_API_KEY
        - objectName: twilio-account-sid
          key: TWILIO_ACCOUNT_SID
        - objectName: twilio-auth-token
          key: TWILIO_AUTH_TOKEN
        - objectName: twilio-messaging-service-sid
          key: TWILIO_MESSAGING_SERVICE_SID
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "REPLACE_USER_ASSIGNED_IDENTITY_CLIENT_ID"
    keyvaultName: "REPLACE_KEY_VAULT_NAME"
    tenantId: "REPLACE_AZURE_TENANT_ID"
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: audit-hmac-key
          objectType: secret
        - |
          objectName: audit-hmac-key-version
          objectType: secret
        - |
          objectName: clerk-secret-key
          objectType: secret
        - |
          objectName: clerk-publishable-key
          objectType: secret
        - |
          objectName: clerk-webhook-secret
          objectType: secret
        - |
          objectName: resend-api-key
          objectType: secret
        - |
          objectName: resend-webhook-secret
          objectType: secret
        - |
          objectName: waitlist-token-secret
          objectType: secret
        - |
          objectName: admin-bearer-token
          objectType: secret
        - |
          objectName: sentry-dsn
          objectType: secret
        - |
          objectName: sentry-public-dsn
          objectType: secret
        - |
          objectName: sentry-auth-token
          objectType: secret
        - |
          objectName: posthog-key
          objectType: secret
        - |
          objectName: posthog-api-key
          objectType: secret
        - |
          objectName: twilio-account-sid
          objectType: secret
        - |
          objectName: twilio-auth-token
          objectType: secret
        - |
          objectName: twilio-messaging-service-sid
          objectType: secret
