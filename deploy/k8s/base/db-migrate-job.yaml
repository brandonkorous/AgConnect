# Runs Prisma migrations + seeds during deploy. Wired as a kubectl-applied Job
# whose name includes the image tag so each deploy creates a fresh Job and the
# rollout waits on its completion before flipping web/api Deployments.
#
# Image is the API image — it already has Prisma + the migrations + the seed
# scripts bundled. Seeds are idempotent, so re-running on every deploy is safe.

apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-REPLACE_TAG
  namespace: agconn
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
    spec:
      serviceAccountName: agconn
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: migrate
          image: REPLACE_AR_BASE/api:REPLACE_TAG
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail
              # Run migrate deploy with the real DATABASE_URL injected from the
              # agconn-env secret, then re-seed translations + lookup tables.
              # Seed scripts run via npx tsx (devDep stripped from prod image)
              # — first run downloads tsx once, npx caches after.
              cd /app/node_modules/@agconn/db
              npx --yes prisma migrate deploy --schema prisma/schema.prisma
              npx --yes tsx scripts/seed-translations.ts
              npx --yes tsx scripts/seed-lookups.ts
          envFrom:
            - configMapRef: { name: agconn-config }
            - secretRef: { name: agconn-env }
