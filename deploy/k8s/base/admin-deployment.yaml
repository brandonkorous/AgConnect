apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: agconn
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/part-of: agconn
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: admin }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin
    spec:
      serviceAccountName: agconn
      nodeSelector: { pool: app }
      tolerations:
        - key: pool
          value: app
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: admin
          image: us-west1-docker.pkg.dev/agconn/containers/admin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
              name: http
          envFrom:
            - configMapRef: { name: agconn-config }
            - secretRef: { name: agconn-env }
          env:
            - name: NEXT_PUBLIC_CLERK_SIGN_IN_URL
              value: "/sign-in"
            - name: NEXT_PUBLIC_CLERK_SIGN_UP_URL
              value: "/sign-in"
            - name: NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL
              value: "/"
            - name: NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL
              value: "/"
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 768Mi }
          startupProbe:
            tcpSocket: { port: http }
            failureThreshold: 24
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: http }
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /, port: http }
            timeoutSeconds: 10
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: agconn
spec:
  selector: { app.kubernetes.io/name: admin }
  ports:
    - port: 80
      targetPort: http
      name: http
  type: ClusterIP
