apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: agconn
  labels: { app.kubernetes.io/name: api, app.kubernetes.io/part-of: agconn }
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: api } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      serviceAccountName: agconn
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: us-west1-docker.pkg.dev/agconn/containers/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef: { name: agconn-config }
            - secretRef: { name: agconn-env }
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: agconn
spec:
  selector: { app.kubernetes.io/name: api }
  ports:
    - port: 80
      targetPort: http
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: agconn
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
