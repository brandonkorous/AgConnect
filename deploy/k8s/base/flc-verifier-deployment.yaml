apiVersion: apps/v1
kind: Deployment
metadata:
  name: flc-verifier
  namespace: agconn
  labels: { app.kubernetes.io/name: flc-verifier, app.kubernetes.io/part-of: agconn }
spec:
  # No replicas: KEDA's ScaledObject (deploy/k8s/base/keda-scaledobjects.yaml)
  # owns the replica count and idles this at 0 when flc.verify is empty. The
  # two cron ticks this used to host are now flc-cronjobs.yaml.
  selector: { matchLabels: { app.kubernetes.io/name: flc-verifier } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flc-verifier
    spec:
      serviceAccountName: agconn
      nodeSelector: { pool: worker }
      tolerations:
        - key: cloud.google.com/gke-spot
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: us-west1-docker.pkg.dev/agconn/containers/flc-verifier:latest
          envFrom:
            - configMapRef: { name: agconn-config }
            - secretRef: { name: agconn-env }
          resources:
            requests: { cpu: 25m, memory: 192Mi }
            # MSPA ingest holds ~12k rows in memory while parsing; bumping
            # the limit gives headroom over the email/sms workers.
            limits: { cpu: 1000m, memory: 768Mi }
