apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-parser
  namespace: agconn
  labels: { app.kubernetes.io/name: resume-parser, app.kubernetes.io/part-of: agconn }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: resume-parser } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resume-parser
    spec:
      serviceAccountName: agconn
      nodeSelector: { pool: worker }
      tolerations:
        - key: cloud.google.com/gke-spot
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: us-west1-docker.pkg.dev/agconn/containers/resume-parser:latest
          envFrom:
            - configMapRef: { name: agconn-config }
            - secretRef: { name: agconn-env }
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
