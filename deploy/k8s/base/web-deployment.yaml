apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: agconn
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: agconn
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: web }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      serviceAccountName: agconn
      nodeSelector: { pool: app }
      tolerations:
        - key: pool
          value: app
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: web
          image: us-west1-docker.pkg.dev/agconn/containers/web:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef: { name: agconn-config }
            - secretRef: { name: agconn-env }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          # startupProbe: TCP-only — just confirm the port is open before
          # readiness/liveness take over. No SSR, no i18n load, no timeout risk.
          startupProbe:
            tcpSocket: { port: http }
            failureThreshold: 24
            periodSeconds: 5
          # livenessProbe: TCP-only — restart only if the process has died, not
          # because a page rendered slowly under CPU load.
          livenessProbe:
            tcpSocket: { port: http }
            periodSeconds: 30
            failureThreshold: 3
          # readinessProbe: real HTTP check confirms the app is serving.
          # 15s timeout gives the cold /en SSR room under throttle.
          readinessProbe:
            httpGet: { path: /en, port: http }
            timeoutSeconds: 15
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: agconn
spec:
  selector: { app.kubernetes.io/name: web }
  ports:
    - port: 80
      targetPort: http
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
  namespace: agconn
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
