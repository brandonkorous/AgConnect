# Ingress: agconn.com / www.agconn.com → web, api.agconn.com → api.
#
# Assumes nginx-ingress + cert-manager are installed cluster-wide (one-time
# bootstrap, see deploy/README.md). The nginx-ingress LoadBalancer is bound to
# the static IP allocated by Terraform (google_compute_address.ingress).
#
# Cert-manager uses Cloudflare DNS01 because Cloudflare proxies traffic to the
# origin (orange cloud), which would intercept HTTP01 challenges. The
# `cloudflare-api-token` Secret is created in the cert-manager namespace at
# bootstrap time from the same CLOUDFLARE_API_TOKEN GitHub secret used by
# Terraform.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: REPLACE_OPS_EMAIL
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: agconn
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["agconn.com", "www.agconn.com"]
      secretName: agconn-web-tls
  rules:
    - host: agconn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: web, port: { number: 80 } }
    - host: www.agconn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: web, port: { number: 80 } }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: agconn
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["api.agconn.com"]
      secretName: agconn-api-tls
  rules:
    - host: api.agconn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: api, port: { number: 80 } }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin
  namespace: agconn
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["admin.agconn.com"]
      secretName: agconn-admin-tls
  rules:
    - host: admin.agconn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: admin, port: { number: 80 } }
