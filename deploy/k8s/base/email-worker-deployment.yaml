apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-worker
  namespace: agconn
  labels: { app.kubernetes.io/name: email-worker, app.kubernetes.io/part-of: agconn }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: email-worker } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: email-worker
    spec:
      serviceAccountName: agconn
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: us-west1-docker.pkg.dev/agconn/containers/email-worker:latest
          envFrom:
            - configMapRef: { name: agconn-config }
            - secretRef: { name: agconn-env }
          resources:
            requests: { cpu: 25m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
