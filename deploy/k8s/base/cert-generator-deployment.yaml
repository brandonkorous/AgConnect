apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-generator
  namespace: agconn
  labels: { app.kubernetes.io/name: cert-generator, app.kubernetes.io/part-of: agconn }
spec:
  # No replicas: KEDA's ScaledObject (deploy/k8s/base/keda-scaledobjects.yaml)
  # owns the replica count and idles this at 0 when enrollment.completed is empty.
  selector: { matchLabels: { app.kubernetes.io/name: cert-generator } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cert-generator
    spec:
      serviceAccountName: agconn
      nodeSelector: { pool: worker }
      tolerations:
        - key: cloud.google.com/gke-spot
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: us-west1-docker.pkg.dev/agconn/containers/cert-generator:latest
          envFrom:
            - configMapRef: { name: agconn-config }
            - secretRef: { name: agconn-env }
          resources:
            requests: { cpu: 25m, memory: 256Mi }
            limits: { cpu: 500m, memory: 768Mi }
