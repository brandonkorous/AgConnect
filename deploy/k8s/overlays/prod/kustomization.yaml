apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agconn

resources:
  - ../../base

# CI inserts the deploy tag here via `kustomize edit set image`. Each entry
# pins a digest after the first push so repeated rollouts don't drift.
images:
  - name: us-west1-docker.pkg.dev/agconn/containers/web
    newName: us-west1-docker.pkg.dev/agconn/containers/web
    newTag: latest
  - name: us-west1-docker.pkg.dev/agconn/containers/admin
    newName: us-west1-docker.pkg.dev/agconn/containers/admin
    newTag: latest
  - name: us-west1-docker.pkg.dev/agconn/containers/api
    newName: us-west1-docker.pkg.dev/agconn/containers/api
    newTag: latest
  - name: us-west1-docker.pkg.dev/agconn/containers/email-worker
    newName: us-west1-docker.pkg.dev/agconn/containers/email-worker
    newTag: latest
  - name: us-west1-docker.pkg.dev/agconn/containers/sms-worker
    newName: us-west1-docker.pkg.dev/agconn/containers/sms-worker
    newTag: latest
  - name: us-west1-docker.pkg.dev/agconn/containers/flc-verifier
    newName: us-west1-docker.pkg.dev/agconn/containers/flc-verifier
    newTag: latest
  - name: us-west1-docker.pkg.dev/agconn/containers/audit-retention
    newName: us-west1-docker.pkg.dev/agconn/containers/audit-retention
    newTag: latest
  - name: us-west1-docker.pkg.dev/agconn/containers/audit-verifier
    newName: us-west1-docker.pkg.dev/agconn/containers/audit-verifier
    newTag: latest
