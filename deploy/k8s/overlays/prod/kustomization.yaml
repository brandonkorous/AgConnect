apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agconn

resources:
  - ../../base

# CI inserts the deploy tag here via `kustomize edit set image`. Each entry
# pins a digest after the first push so repeated rollouts don't drift.
images:
  - name: ghcr.io/REPLACE_OWNER/agconn-web
    newName: ghcr.io/REPLACE_OWNER/agconn-web
    newTag: latest
  - name: ghcr.io/REPLACE_OWNER/agconn-api
    newName: ghcr.io/REPLACE_OWNER/agconn-api
    newTag: latest
  - name: ghcr.io/REPLACE_OWNER/agconn-email-worker
    newName: ghcr.io/REPLACE_OWNER/agconn-email-worker
    newTag: latest
  - name: ghcr.io/REPLACE_OWNER/agconn-sms-worker
    newName: ghcr.io/REPLACE_OWNER/agconn-sms-worker
    newTag: latest
  - name: ghcr.io/REPLACE_OWNER/agconn-audit-retention
    newName: ghcr.io/REPLACE_OWNER/agconn-audit-retention
    newTag: latest
  - name: ghcr.io/REPLACE_OWNER/agconn-audit-verifier
    newName: ghcr.io/REPLACE_OWNER/agconn-audit-verifier
    newTag: latest
